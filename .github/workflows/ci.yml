name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ruff==0.12.11 pytest==8.4.2 pyyaml==6.0.3
      - run: python -m compileall -q src scripts
      - run: ruff check scripts/build_data_manifest.py scripts/verify_data_manifest.py scripts/build_reproduction_results.py scripts/verify_reproduction.py scripts/package_hf_adapters.py scripts/upload_hf_adapters.py tests/test_release_artifacts.py
      - run: pytest -q tests/test_release_artifacts.py

  container-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target source-check -t cora:source-check .
