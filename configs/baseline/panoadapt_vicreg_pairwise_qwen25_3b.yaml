experiment_name: "trackB_qwen25-3b_vicreg50"
output_dir: "runs/baseline"
max_new_tokens: 128

# ECCV release recipe: three-seed CIDEr 0.3410 ± 0.0016 vs native 0.3257 ± 0.0028.
# This config intentionally matches the released adapter target set. Experimental
# split-vision-QKV variants are not used for the Table 1 VICReg row.

model:
  name: "trackB_qwen25-3b_vicreg50"
  hf_model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
  model_type: "qwen_vl"
  dtype: "bfloat16"
  image_size: 224

lora:
  r: 32
  alpha: 64
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  num_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_length: 3072
  seed: 42
  gradient_checkpointing: true
  mixed_precision: "bf16"
  logging_steps: 10
  save_strategy: "epoch"
  save_total_limit: 2
  dataloader_num_workers: 4

data:
  image_column: "url"
  instruction_column: "instruction"
  response_column: "response"

anyres_e2p:
  hfov_deg: 90.0   # h45->h90: align phys_overlap=0.5 with overlap_ratio=0.5 (8 tiles, token-budget unchanged)
  overlap: 0.5   # 0.0->0.5: physically overlap adjacent tiles by 50% each side
  closed_loop_yaw: true
  pitch_min: 0.0
  pitch_max: 0.0
  base_size: 336
  tile_render_size: 672

panoadapt:
  model_type: "qwen_vl"
  rope_type: "3d"
  spatial_pe: true
  overlap_loss: true
  overlap_loss_type: "vicreg_pairwise"
  overlap_loss_weight: 0.1
  overlap_loss_temperature: 0.07
  overlap_ratio: 0.5
  vicreg_sim_weight: 25.0
  vicreg_var_weight: 25.0
  vicreg_cov_weight: 1.0

data_train_csv: "runs/baseline/_shared_data/train.csv"
data_test_csv: "runs/baseline/_shared_data/test.csv"

wandb_enabled: false
